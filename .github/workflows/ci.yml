name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Run Go tests
        working-directory: app
        run: go test ./...

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck -x scripts/*.sh scripts/lib/*.sh scripts/examples/*.sh

      - name: Install Helm
        env:
          HELM_VERSION: v3.20.1
        run: |
          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          tar -xzf /tmp/helm.tar.gz -C /tmp
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Helm lint
        run: helm lint charts/leveldb-app

      - name: Helm template — monitoring disabled
        run: helm template leveldb-app charts/leveldb-app --namespace leveldb-system

      - name: Helm template — monitoring enabled
        run: |
          helm template leveldb-app charts/leveldb-app \
            --namespace leveldb-system \
            --set monitoring.enabled=true \
            --set monitoring.serviceMonitor.enabled=true \
            --set monitoring.prometheusRule.enabled=true \
            --set monitoring.grafanaDashboard.enabled=true

      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: v0.6.7
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests (kubeconform)
        run: |
          helm template leveldb-app charts/leveldb-app \
            --namespace leveldb-system \
            | kubeconform -strict -ignore-missing-schemas -
          helm template leveldb-app charts/leveldb-app \
            --namespace leveldb-system \
            --set monitoring.enabled=true \
            --set monitoring.serviceMonitor.enabled=true \
            --set monitoring.prometheusRule.enabled=true \
            --set monitoring.grafanaDashboard.enabled=true \
            | kubeconform -strict -ignore-missing-schemas -
