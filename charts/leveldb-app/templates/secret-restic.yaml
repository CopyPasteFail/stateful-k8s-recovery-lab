{{- if .Values.backup.enabled }}
{{- /*
  LOCAL DEMO ONLY: Restic and S3 credentials are sourced from Helm values so
  the chart is self-contained for local development.

  In production:
    - Remove this template (or set backup.enabled=false and manage the Secret
      externally).
    - Use an external secrets operator (e.g. External Secrets Operator) backed
      by a cloud KMS or secrets manager (AWS Secrets Manager, GCP Secret
      Manager, HashiCorp Vault).
    - Reference the externally managed Secret in the CronJob env vars.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leveldb-app.fullname" . }}-restic
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leveldb-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
type: Opaque
stringData:
  restic-password: {{ .Values.backup.restic.password | quote }}
  aws-access-key-id: {{ .Values.backup.s3.accessKeyId | quote }}
  aws-secret-access-key: {{ .Values.backup.s3.secretAccessKey | quote }}
{{- end }}
