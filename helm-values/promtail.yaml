# Promtail Helm values — local k3d demo
#
# Promtail is a DaemonSet that tails pod logs from the Kubernetes node and
# ships them to Loki. It discovers pods via the Kubernetes API and adds
# standard labels (namespace, pod, container, app) to every log stream.

config:
  clients:
    - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Tolerate all nodes (including control-plane taints on k3d server nodes)
# so logs are collected from every node in the cluster.
tolerations:
  - operator: Exists
