# Grafana Alloy Helm values — local k3d demo
#
# Alloy runs as a DaemonSet and collects pod logs via the Kubernetes API,
# forwarding them to Loki with namespace and app metadata labels.

alloy:
  configMap:
    content: |
      // Discover all pods in the cluster
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Copy Kubernetes metadata into Loki stream labels
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex         = "(.+)"
          target_label  = "app_kubernetes_io_name"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
          regex         = "(.+)"
          target_label  = "app_kubernetes_io_component"
        }
      }

      // Tail pod logs via the Kubernetes API and forward to Loki
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
      }

      // Push logs to the in-cluster Loki instance
      loki.write "default" {
        endpoint {
          url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

controller:
  type: daemonset

# Tolerate all nodes (including control-plane taints on k3d server nodes)
# so logs are collected from every node in the cluster.
tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
